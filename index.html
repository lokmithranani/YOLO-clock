<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YOLO CLOCK</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: #fff;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            height: 100%;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Fixed Premium Header */
        header {
            position: fixed;
            top: 40px; width: 100%;
            text-align: center;
            letter-spacing: 12px;
            font-weight: 200;
            font-size: 22px;
            z-index: 100;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Hidden Date Input */
        #dateInput { position: absolute; opacity: 0; pointer-events: none; }

        /* Scroll Container with Snapping */
        .clock-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 35vh; 
            padding-bottom: 35vh; 
        }

        .clock-container::-webkit-scrollbar { display: none; }

        /* Time Unit Banners */
        .time-unit {
            min-height: 45vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            scroll-snap-align: center;
            width: 100%;
        }

        .number {
            font-size: 18vw; 
            font-weight: 100; /* Premium ultra-thin */
            margin: 0;
            text-align: center;
            width: 90%;
            white-space: nowrap;
        }

        .label {
            font-size: 14px;
            letter-spacing: 6px;
            opacity: 0.5;
            margin-top: 15px;
            text-transform: uppercase;
            font-weight: 300;
        }

        /* Minimalist Separator and Summary */
        .separator {
            width: 40%;
            height: 1px;
            background-color: #fff;
            margin: 80px auto 20px auto;
            opacity: 0.3;
        }

        .summary-section {
            padding: 40px 20px 120px 20px;
            text-align: center;
        }

        .summary-title {
            font-size: 10px;
            letter-spacing: 4px;
            opacity: 0.4;
            margin-bottom: 15px;
        }

        .summary-text {
            font-size: 14px;
            font-weight: 200;
            line-height: 1.8;
            max-width: 320px;
            margin: 0 auto;
            opacity: 0.7;
        }

        /* Ad Revenue Placeholder */
        #ad-slot {
            margin: 40px auto;
            text-align: center;
            min-height: 100px;
            opacity: 0.4;
            font-size: 10px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <header onclick="document.getElementById('dateInput').showPicker()">YOLO CLOCK</header>
    <input type="date" id="dateInput" onchange="updateBirthDate(this.value)">

    <div class="clock-container" id="clock">
        </div>

    <div id="ad-slot">ADVERTISEMENT SLOT</div>

    <div class="separator"></div>
    
    <div class="summary-section">
        <p class="summary-title">LIFE SUMMARY</p>
        <p class="summary-text">One life. It is a short trip. Focus on the present and make every second count. YOLO.</p>
    </div>

    <script>
        // Initial birthdate - user can change this by tapping header
        let birthDate = new Date("1995-01-01T00:00:00");
        const units = ["years", "months", "weeks", "days", "hours", "minutes", "seconds"];

        function updateBirthDate(val) {
            if(val) {
                birthDate = new Date(val);
                renderClock();
            }
        }

        function calculateTime() {
            const now = new Date();
            const diff = now - birthDate;

            const data = {
                years: diff / (1000 * 60 * 60 * 24 * 365.25),
                months: diff / (1000 * 60 * 60 * 24 * 30.44),
                weeks: diff / (1000 * 60 * 60 * 24 * 7),
                days: diff / (1000 * 60 * 60 * 24),
                hours: diff / (1000 * 60 * 60),
                minutes: diff / (1000 * 60),
                seconds: diff / 1000
            };

            units.forEach(unit => {
                const el = document.getElementById(`val-${unit}`);
                if(el) {
                    // Update numbers with commas for readability
                    el.innerText = Math.floor(data[unit]).toLocaleString();
                }
            });
        }

        function renderClock() {
            const container = document.getElementById('clock');
            container.innerHTML = units.map(unit => `
                <div class="time-unit" id="unit-${unit}">
                    <p class="number" id="val-${unit}">0</p>
                    <p class="label">${unit}</p>
                </div>
            `).join('');
        }

        // Initialize and maintain tick
        renderClock();
        setInterval(calculateTime, 1000);
        calculateTime();
    </script>
</body>
</html>
